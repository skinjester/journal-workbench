  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Manrope", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 14%, rgba(140, 195, 255, 0.12), transparent 24%),
        linear-gradient(180deg, #090c11 0%, var(--bg) 100%);
    }
    .wrap { max-width: min(920px, 100%); margin: 0 auto; padding: var(--sp-4) clamp(var(--sp-3), 4vw, var(--sp-5)) var(--sp-6); }
    .top { margin-bottom: var(--sp-4); }
    .top a {
      color: #79c0ff;
      text-decoration: none;
      font-size: var(--text-md);
      font-weight: 600;
    }
    .top a:hover { text-decoration: underline; }
    .chart-tooltip__kicker {
      margin: var(--sp-2) 0 var(--sp-0-5);
      font-size: var(--text-xs);
      line-height: var(--lh-tight);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #b7c5d8;
    }
    .chart-tooltip__title {
      margin: 0 0 var(--sp-1);
      font-size: var(--text-md);
      line-height: var(--lh-tight);
      font-weight: 800;
      color: #f5f9ff;
    }
    .chart-tooltip__meta {
      margin: 0 0 var(--sp-1);
      font-size: var(--text-sm);
      line-height: 1.3;
      font-weight: 600;
      color: #c8d8ee;
    }
    .chart-tooltip__meta .err { color: #ff9b9b; font-size: var(--text-sm); font-weight: 500; }
    .chart-tooltip__meta .err code { font-size: 0.85em; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
      box-shadow: 0 16px 48px var(--shadow);
      overflow: hidden;
    }
    .panel-inner { padding: clamp(var(--sp-1), 2.5vw, var(--sp-2)); }
    .panel-inner #summary-body.chart-tooltip__body.summary-body.provenance-markdown {
      margin: 0;
      font-size: var(--text-sm);
      line-height: 1.45;
      color: #d8e3f1;
      font-family: "Manrope", system-ui, sans-serif;
      word-break: break-word;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block { margin: 0; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block--empty { min-height: 0.35em; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block--hl {
      background: var(--hl-bg);
      border-left: 3px solid var(--hl-border);
      border-radius: 6px;
      padding: var(--sp-0-5) 10px var(--sp-0-5) var(--sp-2);
      margin: var(--sp-0-5) -10px;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block--hl p:last-child { margin-bottom: 0; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block h3 {
      margin: var(--sp-2) 0 var(--sp-0-5);
      font-family: "Manrope", system-ui, sans-serif;
      font-size: var(--text-xs);
      line-height: var(--lh-tight);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f1f6fd;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block:first-child h3 { margin-top: 0; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block p { margin: 0 0 var(--sp-0-5); }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block p:last-child { margin-bottom: 0; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block ul {
      margin: 0 0 var(--sp-0-5);
      padding-left: 0;
      list-style: none;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block li {
      margin: 0 0 var(--sp-0-5);
      padding-left: 10px;
      text-indent: -10px;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block hr {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: var(--sp-2) 0;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-body-lead-divider {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: var(--sp-2) 0;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown code {
      font-size: var(--text-xs);
      background: rgba(255,255,255,0.07);
      padding: 1px var(--sp-0-5);
      border-radius: 3px;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block em,
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block p em { color: #d0dce8; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown strong { color: #ffffff; font-weight: 700; }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .summary-block--people { margin-top: var(--sp-0-5); }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--sp-1) var(--sp-2);
      margin: var(--sp-0-5) 0 var(--sp-1);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      padding: 3px 10px 3px 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-chip--hl {
      background: var(--hl-bg);
      border-color: var(--hl-border);
      box-shadow: inset 0 0 0 1px rgba(121, 192, 255, 0.12);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      font-size: var(--text-xs);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, rgba(121, 192, 255, 0.38), rgba(49, 109, 202, 0.5));
      color: #f6f9ff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.28);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: #edf3fb;
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-none {
      margin: var(--sp-0-5) 0 var(--sp-1);
      color: var(--muted);
      font-style: italic;
      font-size: var(--text-xs);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .people-plain {
      margin: var(--sp-1) 0 0;
      font-size: var(--text-sm);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .empty {
      color: var(--muted); font-style: italic; padding: var(--sp-2) 0; text-align: center; display: block; font-size: var(--text-sm);
    }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .err { color: #ff9b9b; font-size: var(--text-sm); }
    .panel-inner .chart-tooltip__body.summary-body.provenance-markdown .err code { font-size: 0.85em; }

  <script>
    const provenanceData = {"months":["2013-01","2013-02","2013-03","2013-04","2013-09","2013-10","2013-11","2013-12","2014-01","2014-02","2014-03","2014-04","2014-05","2014-06","2014-07","2014-08","2014-09","2014-10","2014-11","2014-12","2015-01","2015-02","2015-03","2015-04","2015-05","2015-06","2015-07","2015-08","2015-09","2015-10","2015-11","2016-01","2016-02","2016-03","2016-04","2016-05","2016-06","2016-07","2016-08","2016-09","2016-10","2016-11","2016-12","2017-01","2017-02","2017-03","2017-04","2017-05","2017-06","2017-07","2017-08","2017-09","2017-10","2017-11","2017-12","2018-01","2018-02","2018-03","2018-04","2018-05","2018-06","2018-07","2018-08","2018-09","2018-10","2018-11","2018-12","2019-01","2019-02","2019-03","2019-04","2019-05","2019-06","2019-07","2019-08","2019-09","2019-10","2019-11","2019-12","2020-01","2020-02","2020-03","2020-04","2020-05","2020-06","2020-07","2020-08","2020-09","2020-10","2020-11","2020-12","2021-01","2021-02","2021-03","2021-04","2021-05","2021-06","2021-07","2021-08","2021-09","2021-10","2021-11","2021-12","2022-01","2022-02","2022-03","2022-04","2022-05","2022-06","2022-07","2022-08","2022-09","2022-12","2023-01","2023-11","2024-05","2024-07","2024-08"],"monthSources":{"2013-01":"### Goals\n- **[Portfolio]** Bring the skinjester.com WordPress portfolio back to a stable, shippable state after hosting and database churn.\n- **[Portfolio]** Eliminate carousel glitches, Typekit-related white flashes, and FOUT so the site feels fast and intentional on desktop and iPad.\n\n### Workstream\n- **[Portfolio]** Recovered the site from a messy WordPress/database state: cleaned duplicate custom fields, fixed horizontal scroller quirks, and used maintenance mode while stabilizing core behavior.\n- **[Portfolio]** Traced carousel “madness” through WP and jQuery upgrades before isolating the real culprit—custom Google Analytics tracking tied to carousel instrumentation that broke layout when the GA plugin was off—and removed the problematic code.\n- **[Portfolio]** Pulled a clean database export from the legacy Laughing Squid host (DNS pointed back temporarily), rebuilt localhost parity, and re-imported to a new host with URL batch updates and DNS cutover to the new webhost.\n- **[Portfolio]** Detached the **cladinblack** theme from the **WP-Framework** parent, pruned dead scripts/CSS/images, replaced thumbnail hover art with CSS, and ran gzip via `.htaccess` with YSlow-guided tuning.\n- **[Portfolio]** Debugged Typekit: identified `.wf-loading { visibility: hidden }` on `<html>` as the source of the white flash; refined script enqueue order, async loading research, and page-load transitions (including hiding content until fonts ready vs. full-body fade tradeoffs).\n- **[Portfolio]** Refactored PHP in `functions.php` (merged redundant nav helpers), validated HTML/CSS, switched to HTML5 doctype, and learned WordPress logging—fixing a long-standing `tag.php` bug and resolving jQuery `fadeIn()` vs. inline opacity conflicts.\n- **[Portfolio]** Replaced key jQuery motion with **CSS3** transitions/easing for smoother header and carousel movement, with an eye on iPad performance.\n\n### Artifacts Delivered\n- **[Portfolio]** `deliv:prototype` Working localhost and production copies of the portfolio theme with aligned DB and asset transfer path.\n- **[Portfolio]** `deliv:documentation` Validated HTML/CSS passes and cleaner `functions.php` structure.\n- **[Portfolio]** `deliv:operations` Goodsync job from MacBook to webhost for ongoing sync.\n- **[Portfolio]** `deliv:documentation` Documented ongoing quality-control backlog (taxonomy labels, touch carousel, content audit, footer, CDN, caching).\n\n### Key Decisions\n- **[Portfolio]** Stayed on older WordPress/jQuery only long enough to debug; root fix was analytics/carousel coupling, not the WP version alone.\n- **[Portfolio]** Dropped child-theme dependency on WP-Framework to reduce overhead and clarify ownership of the theme.\n- **[Portfolio]** Chose CSS3 transitions over jQuery for primary motion where it improved smoothness and control.\n\n### Open Questions / Follow Ups\n- **[Portfolio]** Long-term: Google Fonts vs. Typekit subscription, spritesheet for brand/nav assets, full CSS/layout refactor, and whether to consolidate uploads by project with CDN backup strategy.\n\n### People Involved\nNone identified\n\n---\n\n*You rebuilt the portfolio database and hosting after Laughing Squid and import problems, found that carousel layout broke because of custom Google Analytics hooks and removed them, detached the theme from WP-Framework, and adjusted Typekit load order and CSS transitions to cut white flashes and janky motion.*\n","2013-02":"### Goals\n- **[Portfolio]** Kill FOUT and inconsistent font loading across home vs. office machines while keeping Typekit in the loop.\n- **[Portfolio]** Introduce proper **version control** and a repeatable dev workflow before doing larger CSS/layout surgery.\n\n### Workstream\n- **[Portfolio]** Solved FOUT with a **CSS-first strategy** (hide Typekit-styled text until `wf-active`, then reveal) and enabled WP page/browser caching; confirmed remaining cases tied to uncached HTML and continued refining load order.\n- **[Portfolio]** Onboarded **Subversion** (Versions on Mac, Sublime plugin, later narrowed scope to the **theme folder only** after wrestling with locks and whole-`wp-content` confusion); set up localhost under SVN after returning to San Francisco.\n- **[Portfolio]** Began systematic **style.css** cleanup: documented float/clearfix debt, dummy HR divs, per-logo CSS files, and entangled font vs. layout rules—planning spritesheets and clearer utilities.\n- **[Portfolio]** Used **Network Link Conditioner** to simulate slow links; adjusted font-reveal behavior for high-latency edge cases (risk of blank screen until Typekit fires) and iterated page-load / footer border choreography.\n- **[Portfolio]** Explored aggressive click-to-navigate transitions, concluded they read as glitches and abandoned them.\n- **[Portfolio]** Built a **category-logo spritesheet**, moved markup toward semantic **unordered lists**, added hover states, and wired category icons with cleaner PHP loops.\n- **[Portfolio]** Restructured **thumbnail index** markup on `tag.php` / `category.php`, unified hover transitions, and repaired asset-nav layout after the optimization pass.\n- **[Portfolio]** Extended the spritesheet to **carousel prev/next/exit**, refined nav transitions for a more physical, fluid feel, and rebuilt carousel scrolling with **standalone CSS3** so behavior stays stable under zoom—then simplified transitions site-wide.\n- **[Portfolio]** Sketched footer information architecture (identity, contact, social, “what next”) for a future content pass.\n\n### Artifacts Delivered\n- **[Portfolio]** `deliv:documentation` Theme folder under Subversion with working copies synced between machines mid-month.\n- **[Portfolio]** `deliv:visuals` Spritesheet-based category dock and carousel chrome with CSS-driven motion.\n- **[Portfolio]** `deliv:documentation` Improved gallery structure and hover behavior on listing templates.\n\n### Key Decisions\n- **[Portfolio]** Scoped SVN to the theme rather than the entire WordPress tree to match actual maintenance needs.\n- **[Portfolio]** Deferred consolidating many near-duplicate `assetnav_*` templates into one parameterized route—acknowledged tech debt but prioritized shipped polish over a large permalink refactor.\n- **[Portfolio]** Standardized on CSS3 for carousel strip scrolling after proving it tracked viewport scale better than the prior JS approach.\n\n### Open Questions / Follow Ups\n- **[Portfolio]** Testimonials still slated to become a **carousel** (randomized static copy fails under page cache); unified hover language for text, sprites, and thumbnails still open.\n- **[Portfolio]** CDN / cookieless domain research parked as “last optimization” after local wins.\n\n### People Involved\nNone identified\n\n---\n\n*You reduced FOUT by hiding Typekit-styled text until fonts were active, put only the WordPress theme folder under Subversion after lock issues on the full tree, and moved category dock and carousel controls onto spritesheets with CSS3 strip scrolling.*\n","2013-03":"### Goals\n- **[Portfolio]** Resume portfolio polish after a side trip into Unity and photogrammetry, with cleaner layout rhythm and a footer that earns its place on the page.\n\n### Workstream\n- **[Portfolio]** Aligned left edges and spacing using a shared **`.viewport`** convention so tags, links, and content blocks share one vertical rhythm.\n- **[Portfolio]** Stood up a **Dropbox-backed SVN workflow** between MacBook and Windows so both machines share a working copy without manual file shuffling— with a note to always update before editing.\n- **[Portfolio]** Iterated footer UX from decorative experiments toward a **functional strip**: sticky-to-bottom layout, spritesheet-backed icon links, and a clearer “follow / contact” story; dropped scroll-to-top-only thinking in favor of global navigation patterns (e.g., fixed header) for later.\n- **[Portfolio]** Patched a **footer border flash** on load (OS X) while continuing CSS simplification.\n- **[Portfolio]** Widened the content column to support bordered in-post imagery and pushed the current branch to the live host with updated **favicon**, typographic utility classes, and tightened tag hover spacing.\n\n### Artifacts Delivered\n- **[Portfolio]** `deliv:documentation` Cross-machine SVN sync via Dropbox with verified commit/update flow.\n- **[Portfolio]** `deliv:visuals` New footer implementation with spritesheet icons and improved anchoring to short vs. tall pages.\n- **[Portfolio]** `deliv:documentation` Production deploy including identity graphics and typography cleanup.\n\n### Key Decisions\n- **[Portfolio]** Treated the footer as a **control surface** (actions and identity) rather than only visual ballast.\n- **[Portfolio]** Deferred “scroll to top” as a footer-exclusive feature—recognized it fails on short pages and belongs in persistent chrome instead.\n\n### Open Questions / Follow Ups\n- **[Portfolio]** Floating/fixed header behavior and further carousel/template consolidation remain on the backlog from prior months.\n\n### People Involved\nNone identified\n\n---\n\n*You aligned page layout with a shared viewport class, set up Dropbox-backed SVN between Mac and Windows for the theme, replaced the footer with a spritesheet icon strip and sticky bottom behavior, and deployed favicon and typography updates to production.*\n","2013-04":"### Goals\n- **[Portfolio]** Expand skinjester.com with new client work (**RealU**, **Rumble**) while keeping the dock, tags, and carousel coherent.\n- **[Portfolio]** Simplify the public taxonomy—fewer, clearer buckets than the older UX/chronology sprawl.\n\n### Workstream\n- **[Portfolio]** Added category icons and fixed layout breakage from tag growth by merging **Concept** with **Visual Design**, dropping **Heads-Up-Display**, and renaming the old UX bucket to **Systems**.\n- **[Portfolio]** Debugged WordPress admin quirks (media library vs. Google-hosted jQuery; blank new pages) and aligned page templates with **assetnav_** PHP templates until publishing flow stabilized.\n- **[Portfolio]** Restored **Prototype**-era chronology support (2012/2013) where needed and aligned category icon interaction with the footer icon pattern.\n- **[Portfolio]** Shipped a textured **background** treatment (with an eye toward later optimization) and refreshed **global typography** and **credits** custom fields—including LucasArts entries.\n- **[Portfolio]** Experimented with **tag cloud** structure (Graphics / Systems / Research ordering) and moved the carousel to **`translate3d`** for smoother motion, with follow-up investigation of remaining **iPad** glitches.\n\n### Artifacts Delivered\n- **[Portfolio]** `deliv:documentation` Updated local and hosted databases with new categories, tags, and RealU content nearly ready for production transfer.\n- **[Portfolio]** `deliv:documentation` Credits field and layouts applied across relevant posts.\n\n### Key Decisions\n- **[Portfolio]** Chronological tags were candidates for removal in favor of larger, clearer facet labels at the top of the tag area.\n- **[Portfolio]** Chose hardware-accelerated carousel transforms as the path to better perceived performance on mobile.\n\n### Open Questions / Follow Ups\n- **[Portfolio]** iPad carousel edge cases remained unresolved at month end.\n\n### People Involved\nNone identified\n\n---\n\n*You added RealU and Rumble work to skinjester, merged and renamed portfolio categories to cut clutter, fixed WordPress admin and template issues, and switched the carousel to translate3d for smoother motion while some iPad cases stayed open.*\n","2013-09":"### Goals\n- **[ESO]** Take ownership of **ability and item tooltip standardization**: inventory every surface, define layout anatomy, and make recommendations engineers can implement.\n- **[ESO]** Get unblocked on **internal builds** (playtest vs. dev), **Perforce**, and **JIRA** so the work lives inside studio pipelines, not just Fireworks files.\n\n### Workstream\n- **[ESO]** Cleared environment hurdles with QA and IT: internal beta keys, dual-client login tricks, Dropbox policy, P4 access, and Visio for collation.\n- **[ESO]** Played deep into Tamriel to **capture live tooltips** across inventory, bank, guild, crafting, abilities, loot, chat links, and edge systems—building a categorized matrix of item parameters, bind states, sets, traits, and where each pattern appears.\n- **[ESO]** Partnered with design and engineering (**Mark**, **Dan**, **Chris**, **Ed**, **Nathan**, **Brian** on siege examples) for templates, font constants, console cheats (`)addexp`, `)createitem`), and systems truth (enchanting vs. traits vs. set bonuses).\n- **[ESO]** Iterated **layout v3.x** on a **16px grid** at **1920×1080**, normalized font metrics, inverted comps to check contrast, and simplified verbose **set bonus** copy into scannable structures.\n- **[ESO]** Documented **comparison tooltip** minimalism, **quest**, **siege**, **mount**, and crafting-adjacent cases; began mapping **ability** tooltip states through leveling and morph.\n\n### Artifacts Delivered\n- **[ESO]** `deliv:design-system` Expanding Fireworks styleguide pages with repeatable blocks (item type, binding, primary stats, meters, effect lists, restrictions, crafted-by, set tables).\n- **[ESO]** `deliv:documentation` Structured capture backlog and WIP reviews with Chris and Ed aligned to direction.\n\n### Key Decisions\n- **[ESO]** Treated **traits** as part of the item title line where possible; focused enchant callouts on permanence/replaceability rather than noisy restatement.\n- **[ESO]** Accepted that **ability “next rank”** stats may not fit a single branchy progression model—clarified that constraint with Dan before over-specifying.\n\n### Open Questions / Follow Ups\n- **[ESO]** Crafting pillars (provisioning, alchemy, etc.) in flux—tooltip specs needed ongoing sync with individual system owners.\n\n### People Involved\n- Chris\n- Dan\n- Mark\n- Nathan\n- Ed\n- Katie\n- Andy\n- Chip\n- Brian Wheeler\n- James Wells\n\n---\n\n*You cleared internal build, Perforce, and JIRA access with QA and IT, captured live item and ability tooltips across the game into a categorized matrix, and iterated Fireworks layout v3 on a 16px grid with Chris, Dan, Mark, and Ed on templates and bind and set presentation.*\n","2013-10":"### Goals\n- **[ESO]** Finish and **distribute item tooltip styleguide v5** so implementation could begin without ambiguity.\n- **[ESO]** Stand up **Axure** prototypes for **stats/character** surfaces and the **game menu** (options, controls, add-ons, login/2FA) with enough interactivity for real review.\n\n### Workstream\n- **[ESO]** Closed the **item tooltip** spec for the current milestone: **v5** packaged, emailed to a broad distribution list, and iterated after **first-pass in-game** screenshots exposed frame anatomy gaps.\n- **[ESO]** Built **stats/character** flows in Axure (paper-doll, comparison, morph states) and aligned with **Paul**/**Nick** on **overcharge** UI and tech feasibility.\n- **[ESO]** Scoped **Game Menu** with **Chris** via spreadsheet (list nav, add-ons, options, credits) and moved into **Confluence** handoff notes for **Andy** (implementation) and **Marc** (meters/visual pass).\n- **[ESO]** Prototyped **options** stacks: accordions for Interface/Gameplay, **on/off switches** with full-row hit targets, **add-ons** list with character scope and reload cases, and **keybinding** layering (tabs/icons per Dan’s Battlefield-adjacent model).\n- **[ESO]** Hacked **embedded fonts** in Axure HTML for cross-machine fidelity (with caveats for generator machine and OTF→TTF quality), added **in-game background** toggle for context, and sketched **trusted/public computer** login icon placement.\n- **[ESO]** Continued **ability tooltip** capture and organization; noted **Iron Galaxy** console UI audit context where relevant to cross-platform thinking.\n\n### Artifacts Delivered\n- **[ESO]** `deliv:design-system` Shipped **item tooltip styleguide v5** and follow-up layout revisions from implementation feedback.\n- **[ESO]** `deliv:documentation` Axure exports to shared drives; interactive switch/accordion demos; WIP reviews with **Chris**, **Marc**, **Nathan**.\n\n### Key Decisions\n- **[ESO]** Chris pushed back on inventing a **new on/off widget**—conversation opened toward aligning with existing dropdown/checkbox/radio patterns while preserving clarity.\n- **[ESO]** Reverted **Controls** to a top-level menu containing camera and keybinding after design sync.\n\n### Open Questions / Follow Ups\n- **[ESO]** Row hover highlighting in Axure proved **non-scalable**—noted as a prototype limitation vs. shipping interaction.\n\n### People Involved\n- Chris\n- Andy\n- Marc\n- Nat
